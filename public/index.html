<!DOCTYPE html>
<html>
<head>
    <title>Multiplayer Chess</title>
    <link rel="stylesheet" href="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        body { 
            background-color: #312e2b; 
            color: #ffffff; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            margin: 0;
            display: flex; 
            height: 100vh;
            overflow: hidden; 
        }

        /* --- THE SIDEBAR --- */
        #sidebar {
            width: 220px;
            background-color: #262421;
            padding: 20px 10px;
            display: flex;
            flex-direction: column;
            box-shadow: 4px 0 15px rgba(0,0,0,0.4);
            z-index: 100;
        }

        .brand-logo {
            font-size: 24px;
            font-weight: 900;
            color: #81b64c;
            text-align: center;
            margin-bottom: 40px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* NEW: Grouping the top menu so we can push the bottom menu down */
        .sidebar-nav {
            flex-grow: 1; /* This pushes the bottom section all the way down */
        }

        .sidebar-bottom {
            border-top: 1px solid #403d39;
            padding-top: 15px;
        }

        .menu-item {
            display: flex;
            align-items: center;
            padding: 15px 20px;
            color: #c3c2c1;
            text-decoration: none;
            font-size: 18px;
            font-weight: bold;
            border-radius: 8px;
            margin-bottom: 5px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .menu-item i { margin-right: 15px; font-size: 22px; width: 30px; text-align: center; }
        .menu-item:hover { background-color: #3d3b39; color: #ffffff; transform: translateX(5px); }
        .menu-item.active { background-color: #312e2b; color: #ffffff; }
        .menu-item.active i { color: #81b64c; }

        /* --- MAIN CONTENT AREA --- */
        #main-content {
            flex-grow: 1; 
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow-y: auto; 
        }

        /* --- SCREENS --- */
        .screen { display: none; width: 100%; align-items: center; justify-content: center; }
        .active-screen { display: flex; }

        #landingScreen { flex-direction: row; gap: 60px; max-width: 1000px; }
        .hero-graphic { background-color: #262421; width: 300px; height: 300px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center; font-size: 100px; }
        .branding-panel { max-width: 450px; text-align: left; }
        .branding-panel h2 { font-size: 46px; font-weight: 900; line-height: 1.1; margin: 0 0 15px 0; }
        .branding-panel h2 span { color: #81b64c; }
        .branding-panel p { font-size: 20px; color: #a7a6a2; line-height: 1.4; margin-bottom: 30px; }

        .menu-card { background-color: #262421; padding: 40px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); width: 100%; max-width: 350px; text-align: center; flex-direction: column; }
        .menu-card h1 { color: #81b64c; margin: 0 0 25px 0; font-size: 28px; text-transform: uppercase; }

        button { background-color: #81b64c; color: white; border: none; padding: 15px; font-size: 16px; font-weight: bold; border-radius: 8px; cursor: pointer; width: 100%; transition: background 0.2s, transform 0.1s; margin-bottom: 10px; }
        button:hover { background-color: #92c959; transform: translateY(-2px); }
        .secondary-btn { background-color: #403d39; }
        .secondary-btn:hover { background-color: #524f4a; }
        
        #getStartedBtn { background-color: #ffffff; color: #312e2b; font-size: 18px; padding: 18px 30px; width: auto; border-radius: 10px; }
        #getStartedBtn:hover { background-color: #e0e0e0; }

        input { background-color: #312e2b; color: white; border: 2px solid #403d39; padding: 15px; font-size: 16px; border-radius: 8px; width: 100%; margin-bottom: 15px; box-sizing: border-box; outline: none; text-align: center; font-weight: bold; }
        input:focus { border-color: #81b64c; }
        .divider { color: #888888; font-size: 14px; margin: 15px 0; font-weight: bold; }

        #gameArea { flex-direction: column; max-width: 450px; }
        #roomDisplay { background-color: #262421; padding: 10px; border-radius: 8px; color: #81b64c; margin-bottom: 20px; }
        #myBoard { border-radius: 4px; overflow: hidden; box-shadow: 0 15px 30px rgba(0,0,0,0.6); }

        @media (max-width: 768px) {
            body { flex-direction: column; }
            #sidebar { width: 100%; flex-direction: row; flex-wrap: wrap; justify-content: space-around; padding: 10px 0; }
            .brand-logo, .sidebar-bottom { display: none; } /* Hide bottom stuff on tiny screens to save space */
            .sidebar-nav { display: flex; width: 100%; justify-content: space-around; }
            .menu-item { padding: 10px; margin: 0; font-size: 14px; }
            .menu-item i { margin-right: 5px; font-size: 18px; }
            #landingScreen { flex-direction: column; text-align: center; }
            .branding-panel { text-align: center; }
        }
    </style>
</head>
<body>

    <nav id="sidebar">
        <div class="brand-logo">♔ CHESS</div>
        
        <div class="sidebar-nav">
            <a class="menu-item active" onclick="changeScreen('landingScreen', this)">
                <i class="fa-solid fa-hand-pointer"></i> Play
            </a>
            <a class="menu-item" onclick="alert('Puzzles coming soon!')">
                <i class="fa-solid fa-puzzle-piece"></i> Puzzles
            </a>
            <a class="menu-item" onclick="alert('Lessons coming soon!')">
                <i class="fa-solid fa-graduation-cap"></i> Learn
            </a>
        </div>

        <div class="sidebar-bottom">
            <a class="menu-item" onclick="changeScreen('loginScreen', this)">
                <i class="fa-solid fa-right-to-bracket"></i> Login
            </a>
            <a class="menu-item" onclick="changeScreen('signupScreen', this)">
                <i class="fa-solid fa-user-plus"></i> Sign Up
            </a>
            <a class="menu-item" onclick="changeScreen('languageScreen', this)">
                <i class="fa-solid fa-globe"></i> Language
            </a>
        </div>
    </nav>

    <main id="main-content">
        
        <div id="landingScreen" class="screen active-screen">
            <div class="hero-graphic">♞</div>
            <div class="branding-panel">
                <h2>Play First <span>Indian</span> Chess On A Site!</h2>
                <p>play with playerss and train your chess performance!</p>
                <button id="getStartedBtn" onclick="changeScreen('loginScreen')">Get Started!</button>
            </div>
        </div>

        <div id="loginScreen" class="screen">
            <div class="menu-card">
                <h1>Player Login</h1>
                <input type="text" id="usernameInput" placeholder="Enter Username">
                <input type="password" id="passwordInput" placeholder="Password">
                <button onclick="handleLogin()">Login</button>
                <p class="divider">Don't have an account?</p>
                <button class="secondary-btn" onclick="changeScreen('signupScreen')">Create Account</button>
            </div>
        </div>

        <div id="signupScreen" class="screen">
            <div class="menu-card">
                <h1>Sign Up</h1>
                <input type="text" id="newUsername" placeholder="Choose a Username">
                <input type="email" id="newEmail" placeholder="Email Address">
                <input type="password" id="newPassword" placeholder="Create Password">
                <button onclick="alert('Account created! Please log in.'); changeScreen('loginScreen');">Register</button>
            </div>
        </div>

        <div id="languageScreen" class="screen">
            <div class="menu-card">
                <h1>Choose Language</h1>
                <button onclick="alert('Language changed to English!'); changeScreen('landingScreen');">English</button>
                <button class="secondary-btn" onclick="alert('Language changed to Hindi!'); changeScreen('landingScreen');">हिंदी (Hindi)</button>
                <button class="secondary-btn" onclick="alert('Language changed to Spanish!'); changeScreen('landingScreen');">Español (Spanish)</button>
                <button class="secondary-btn" style="margin-top: 20px;" onclick="changeScreen('landingScreen')">Cancel</button>
            </div>
        </div>

        <div id="dashboardScreen" class="screen">
            <div class="menu-card">
                <h1 id="welcomeText">Welcome!</h1>
                <button id="createBtn">Create Private Game</button>
                <p class="divider">— OR —</p>
                <input type="text" id="roomInput" placeholder="Enter 4-Letter Code" maxlength="4" style="text-transform: uppercase;">
                <button id="joinBtn">Join Game</button>
            </div>
        </div>

        <div id="gameArea" class="screen">
            <h3 id="roomDisplay"></h3>
            <div id="myBoard"></div>
        </div>

    </main>

    <script>
        // Updated to also move the green "active" highlight to the clicked sidebar menu
        function changeScreen(screenId, element = null) {
            // Hide all screens
            document.querySelectorAll('.screen').forEach(screen => {
                screen.classList.remove('active-screen');
            });
            // Show the target screen
            document.getElementById(screenId).classList.add('active-screen');

            // If a sidebar link was clicked, move the active highlight
            if (element) {
                document.querySelectorAll('.menu-item').forEach(item => {
                    item.classList.remove('active');
                });
                element.classList.add('active');
            }
        }

        function handleLogin() {
            const username = document.getElementById('usernameInput').value;
            if(username.trim() !== "") {
                document.getElementById('welcomeText').innerText = "Welcome, " + username + "!";
            } else {
                document.getElementById('welcomeText').innerText = "Welcome, Guest!";
            }
            changeScreen('dashboardScreen');
        }
    </script>

    <script src="/socket.io/socket.io.js"></script>
    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <script src="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
    <script src="client.js"></script>

</body>
</html>

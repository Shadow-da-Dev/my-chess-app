<!DOCTYPE html>
<html>
<head>
    <title>Multiplayer Chess</title>
    <link rel="stylesheet" href="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css">
    <style>
        body { font-family: Arial, sans-serif; text-align: center; margin-top: 50px; }
        #lobby { margin-bottom: 20px; }
        input, button { padding: 10px; font-size: 16px; margin: 5px; cursor: pointer; }
        #gameArea { display: none; }
        #myBoard { width: 400px; margin: 0 auto; }
    </style>
</head>
<body>
    <h1>Multiplayer Chess</h1>

    <div id="lobby">
        <button id="createBtn">Create Private Game</button>
        <p>— OR —</p>
        <input type="text" id="roomInput" placeholder="Enter 4-Letter Code">
        <button id="joinBtn">Join Game</button>
    </div>

    <div id="gameArea">
        <h3 id="roomDisplay"></h3>
        <div id="myBoard"></div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    
    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <script src="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
    
    <script src="client.js"></script>
</body>
</html>

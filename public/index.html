<!DOCTYPE html>
<html>
<head>
    <title>Multiplayer Chess</title>
    <link rel="stylesheet" href="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        body { background-color: #312e2b; color: #ffffff; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        
        /* Sidebar */
        #sidebar { width: 220px; background-color: #262421; padding: 20px 10px; display: flex; flex-direction: column; box-shadow: 4px 0 15px rgba(0,0,0,0.4); z-index: 100; }
        .brand-logo { font-size: 24px; font-weight: 900; color: #81b64c; text-align: center; margin-bottom: 40px; text-transform: uppercase; letter-spacing: 1px; }
        .sidebar-nav { flex-grow: 1; }
        .sidebar-bottom { border-top: 1px solid #403d39; padding-top: 15px; }
        .menu-item { display: flex; align-items: center; padding: 15px 20px; color: #c3c2c1; text-decoration: none; font-size: 18px; font-weight: bold; border-radius: 8px; margin-bottom: 5px; cursor: pointer; transition: all 0.2s ease; }
        .menu-item i { margin-right: 15px; font-size: 22px; width: 30px; text-align: center; }
        .menu-item:hover { background-color: #3d3b39; color: #ffffff; transform: translateX(5px); }
        .menu-item.active { background-color: #312e2b; color: #ffffff; }
        .menu-item.active i { color: #81b64c; }

        /* Main Area */
        #main-content { flex-grow: 1; padding: 20px; display: flex; justify-content: center; align-items: center; overflow-y: auto; }
        .screen { display: none; width: 100%; align-items: center; justify-content: center; }
        .active-screen { display: flex; }

        /* Landing Page */
        #landingScreen { flex-direction: row; gap: 60px; max-width: 1000px; }
        .branding-panel { max-width: 450px; text-align: left; }
        .branding-panel h2 { font-size: 46px; font-weight: 900; line-height: 1.1; margin: 0 0 15px 0; }
        
        /* Menu Cards */
        .menu-card { background-color: #262421; padding: 40px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); width: 100%; max-width: 350px; text-align: center; flex-direction: column; }
        .menu-card h1 { color: #81b64c; margin: 0 0 25px 0; font-size: 28px; text-transform: uppercase; }

        button { background-color: #81b64c; color: white; border: none; padding: 15px; font-size: 16px; font-weight: bold; border-radius: 8px; cursor: pointer; width: 100%; transition: background 0.2s, transform 0.1s; margin-bottom: 10px; }
        button:hover { background-color: #92c959; transform: translateY(-2px); }
        .secondary-btn { background-color: #403d39; }
        #getStartedBtn { background-color: #ffffff; color: #312e2b; font-size: 18px; padding: 18px 30px; width: auto; border-radius: 10px; }

        input { background-color: #312e2b; color: white; border: 2px solid #403d39; padding: 15px; font-size: 16px; border-radius: 8px; width: 100%; margin-bottom: 15px; box-sizing: border-box; outline: none; text-align: center; font-weight: bold; }
        .divider { color: #888888; font-size: 14px; margin: 15px 0; font-weight: bold; }

        #gameArea { flex-direction: column; max-width: 450px; }
        #myBoard { border-radius: 4px; overflow: hidden; box-shadow: 0 15px 30px rgba(0,0,0,0.6); }
    </style>
</head>
<body>

    <nav id="sidebar">
        <div class="brand-logo">♔ CHESS</div>
        <div class="sidebar-nav">
            <a class="menu-item active" onclick="changeScreen('landingScreen', this)"><i class="fa-solid fa-hand-pointer"></i> <span id="nav-play">Play</span></a>
            <a class="menu-item" onclick="alert('Puzzles coming soon!')"><i class="fa-solid fa-puzzle-piece"></i> <span id="nav-puzzles">Puzzles</span></a>
            <a class="menu-item" onclick="alert('Lessons coming soon!')"><i class="fa-solid fa-graduation-cap"></i> <span id="nav-learn">Learn</span></a>
        </div>
        <div class="sidebar-bottom">
            <a class="menu-item" onclick="changeScreen('loginScreen', this)"><i class="fa-solid fa-right-to-bracket"></i> <span id="nav-login">Login</span></a>
            <a class="menu-item" onclick="changeScreen('signupScreen', this)"><i class="fa-solid fa-user-plus"></i> <span id="nav-signup">Sign Up</span></a>
            <a class="menu-item" onclick="changeScreen('languageScreen', this)"><i class="fa-solid fa-globe"></i> <span id="nav-lang">Language</span></a>
        </div>
    </nav>

    <main id="main-content">
        <div id="landingScreen" class="screen active-screen">
            <div id="myBoard" style="width: 300px; box-shadow: 0 10px 25px rgba(0,0,0,0.5);"></div>
            <div class="branding-panel" style="margin-left: 40px;">
                <h2 id="landing-title">Play First <span style="color:#81b64c;">Indian</span> Chess On A Site!</h2>
                <button id="getStartedBtn" onclick="changeScreen('loginScreen')"><span id="landing-btn">Get Started!</span></button>
                <button class="secondary-btn" onclick="playCheckmateAnimation()" style="margin-top: 10

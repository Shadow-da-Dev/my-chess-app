<!DOCTYPE html>
<html>
<head>
    <title>Multiplayer Chess</title>
    <link rel="stylesheet" href="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <script src="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
    
    <style>
        body { background-color: #312e2b; color: #ffffff; font-family: sans-serif; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        #sidebar { width: 220px; background-color: #262421; padding: 20px; display: flex; flex-direction: column; }
        .menu-item { padding: 15px; cursor: pointer; color: #c3c2c1; font-weight: bold; }
        .menu-item:hover { color: #81b64c; }
        #main-content { flex-grow: 1; display: flex; justify-content: center; align-items: center; }
        .screen { display: none; width: 100%; justify-content: center; align-items: center; }
        .active-screen { display: flex; }
        #landingScreen { gap: 50px; }
        .menu-card { background: #262421; padding: 30px; border-radius: 10px; width: 300px; text-align: center; }
        button { background: #81b64c; color: white; border: none; padding: 12px; width: 100%; margin-top: 10px; cursor: pointer; border-radius: 5px; }
        input { padding: 10px; width: 100%; margin-top: 10px; box-sizing: border-box; }
    </style>
</head>
<body>

    <nav id="sidebar">
        <div style="color: #81b64c; font-weight: 900; margin-bottom: 20px;">♔ CHESS</div>
        <div class="menu-item" onclick="changeScreen('landingScreen')"><i class="fa fa-home"></i> Play</div>
        <div class="menu-item" onclick="changeScreen('loginScreen')"><i class="fa fa-user"></i> Login</div>
    </nav>

    <main id="main-content">
        <div id="landingScreen" class="screen active-screen">
            <div id="landingBoard" style="width: 300px;"></div>
            <div style="max-width: 300px;">
                <h2>Play Indian Chess</h2>
                <button onclick="changeScreen('loginScreen')">Get Started!</button>
                <button onclick="playCheckmateAnimation()" style="background:#403d39">Watch Checkmate</button>
            </div>
        </div>

        <div id="loginScreen" class="screen">
            <div class="menu-card">
                <h1>Login</h1>
                <input type="text" id="user" placeholder="Username">
                <button onclick="handleLogin()">Login</button>
            </div>
        </div>

        <div id="dashboardScreen" class="screen">
            <div class="menu-card">
                <h1>Dashboard</h1>
                <button id="createBtn">Create Game</button>
            </div>
        </div>
    </main>

    <script>
        // Init Landing Board
        var board = Chessboard('landingBoard', 'start');
        var game = new Chess();

        function playCheckmateAnimation() {
            game.reset();
            const moves = ['e4', 'e5', 'Bc4', 'Nc6', 'Qh5', 'Nf6', 'Qxf7#'];
            let i = 0;
            const interval = setInterval(() => {
                if(i < moves.length) {
                    game.move(moves[i]);
                    board.position(game.fen());
                    i++;
                } else { clearInterval(interval); }
            }, 800);
        }

        function changeScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active-screen'));
            document.getElementById(id).classList.add('active-screen');
        }

        function handleLogin() {
            // Forcefully switch screens
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active-screen'));
            document.getElementById('dashboardScreen').classList.add('active-screen');
        }
    </script>
</body>
</html>

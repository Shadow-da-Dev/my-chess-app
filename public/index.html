<!DOCTYPE html>
<html>
<head>
    <title>Chess</title>
    <link rel="stylesheet" href="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css">
    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <script src="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
    
    <style>
        body { background: #312e2b; color: white; font-family: sans-serif; margin: 0; display: flex; height: 100vh; }
        #sidebar { width: 200px; background: #262421; padding: 20px; }
        .nav-link { cursor: pointer; padding: 10px; display: block; color: #ccc; }
        .nav-link:hover { color: #81b64c; }
        #main { flex-grow: 1; display: flex; justify-content: center; align-items: center; }
        .screen { display: none; }
        .active { display: block; }
        button { background: #81b64c; border: none; padding: 10px 20px; color: white; cursor: pointer; border-radius: 4px; }
    </style>
</head>
<body>

    <nav id="sidebar">
        <div class="nav-link" onclick="showScreen('landing')">Play</div>
        <div class="nav-link" onclick="showScreen('login')">Login</div>
    </nav>

    <div id="main">
        <div id="landing" class="screen active">
            <div id="board1" style="width: 300px;"></div>
            <h2>Play Indian Chess</h2>
            <button onclick="showScreen('login')">Get Started!</button>
            <button onclick="animateBoard()">Watch Checkmate</button>
        </div>

        <div id="login" class="screen">
            <input type="text" id="user" placeholder="Username"><br>
            <button onclick="loginSuccess()">Login</button>
        </div>

        <div id="dashboard" class="screen">
            <h1>Welcome!</h1>
            <button id="createBtn">Create Game</button>
        </div>
    </div>

    <script>
        // Init board
        var b1 = Chessboard('board1', 'start');
        var game = new Chess();

        // Simple screen swapper
        function showScreen(id) {
            $('.screen').removeClass('active');
            $('#' + id).addClass('active');
        }

        // Logic
        function loginSuccess() { showScreen('dashboard'); }

        function animateBoard() {
            game.reset();
            const moves = ['e4', 'e5', 'Bc4', 'Nc6', 'Qh5', 'Nf6', 'Qxf7#'];
            let i = 0;
            let interval = setInterval(() => {
                if(i < moves.length) {
                    game.move(moves[i]);
                    b1.position(game.fen());
                    i++;
                } else { clearInterval(interval); }
            }, 800);
        }
    </script>
</body>
</html>
